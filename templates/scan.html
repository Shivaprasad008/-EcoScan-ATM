{% extends "base.html" %}

{% block content %}
<div class="auth-container">
    <div class="glass-card auth-card" style="max-width: 500px;">
        <div class="text-center mb-2">
            <div class="icon-circle" style="width: 80px; height: 80px; font-size: 2.5rem;">
                <i class="fa-solid fa-camera-rotate pulse"></i>
            </div>
            <h2>Scan Plastic Bottle</h2>
            <p class="text-muted">Upload an image of your plastic bottle for AI verification.</p>
        </div>

        <form method="POST" action="{{ url_for('scan') }}" enctype="multipart/form-data">
            <div class="scan-area text-center" id="drop-area" style="border: 2px dashed rgba(16, 185, 129, 0.5); border-radius: 12px; padding: 3rem 1rem; margin-bottom: 2rem; background: rgba(0,0,0,0.2); cursor: pointer; transition: all 0.3s;">
                <i class="fa-regular fa-image" style="font-size: 3rem; color: var(--text-muted); margin-bottom: 1rem;"></i>
                <p>Click to select or drag and drop image</p>
                <input type="file" id="bottle_image" name="bottle_image" accept="image/*" required style="display: none;">
                
                <img id="preview" src="#" alt="Preview" style="display: none; max-width: 100%; border-radius: 8px; margin-top: 1rem; max-height: 200px; object-fit: contain;">
            </div>
            
            <button type="submit" class="btn-primary w-100 btn-lg" id="submit-btn" disabled>
                <i class="fa-solid fa-microchip"></i> Analyze Image
            </button>
        </form>
    </div>
</div>

<script>
    const dropArea = document.getElementById('drop-area');
    const fileInput = document.getElementById('bottle_image');
    const preview = document.getElementById('preview');
    const submitBtn = document.getElementById('submit-btn');

    dropArea.addEventListener('click', () => fileInput.click());

    fileInput.addEventListener('change', function() {
        const file = this.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                preview.src = e.target.result;
                preview.style.display = 'block';
                dropArea.querySelector('i').style.display = 'none';
                dropArea.querySelector('p').style.display = 'none';
                submitBtn.disabled = false;
            }
            reader.readAsDataURL(file);
        }
    });
</script>

<style>
    .pulse {
        animation: pulse-animation 2s infinite;
    }
    @keyframes pulse-animation {
        0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
        70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); }
        100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
    }
</style>
{% endblock %}
